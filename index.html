<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>双耳拍体验器 Pro</title>
<meta name="description" content="Binaural Beat Explorer — 纯音 · 音乐频移 · 持续音">
<meta name="theme-color" content="#0a0a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="top-bar">
  <h1>🎧 <span data-i18n="title">双耳拍体验器 Pro</span></h1>
  <button class="lang-btn" id="langBtn" title="Switch Language">EN</button>
</div>
<p class="subtitle" data-i18n="subtitle">Binaural Beat Explorer — 纯音 · 音乐频移 · 持续音</p>

<div class="warning">
  ⚠️ <strong>必须佩戴耳机！</strong>左右耳需分别接收不同频率。用扬声器无效。建议低音量开始。
</div>

<div class="container">
  <!-- Mode tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-mode="pure">🎵 纯音</button>
    <button class="tab-btn" data-mode="music">🎶 音乐频移</button>
    <button class="tab-btn" data-mode="drone">🕉 持续音</button>
  </div>

  <button class="play-btn off" id="playBtn">▶ 戴上耳机，点击开始</button>

  <!-- Pure Tone Panel -->
  <div class="panel active" id="panel-pure">
    <div class="control-group">
      <div class="control-label">
        <span class="name">载波频率</span>
        <span class="value" id="carrierVal">200 Hz</span>
      </div>
      <input type="range" id="carrier" min="80" max="1000" value="200" step="10">
    </div>
  </div>

  <!-- Music Panel -->
  <div class="panel" id="panel-music">
    <div class="file-area" id="fileArea">
      📁 点击或拖放音频文件（MP3 / WAV / OGG / FLAC）
      <input type="file" id="fileInput" accept="audio/*">
    </div>
    <div style="margin-top:8px; font-size:0.8em; color:#666;" id="fileInfo"></div>
    <div style="display:flex; gap:16px; margin-top:8px; font-size:0.82em; color:#aaa;">
      <label style="display:flex; align-items:center; gap:6px; cursor:pointer;">
        <input type="checkbox" id="loopToggle" checked> <span data-i18n="loop">循环播放</span>
      </label>
      <label style="display:flex; align-items:center; gap:6px; cursor:pointer;">
        <input type="checkbox" id="stereoToggle" checked> <span data-i18n="stereo">保留立体声</span>
      </label>
    </div>
  </div>

  <!-- Drone Panel -->
  <div class="panel" id="panel-drone">
    <div class="control-group">
      <div class="control-label">
        <span class="name">持续音类型</span>
      </div>
      <select id="droneType">
        <option value="tambura">🪕 坦布拉 Tambura — 丰富泛音</option>
        <option value="bowl">🔔 颂钵 Singing Bowl — 非谐波泛音</option>
        <option value="organ">⛪ 管风琴 Organ — 庄严和声</option>
        <option value="pad">🎹 合成Pad — 温暖厚实</option>
      </select>
    </div>
    <div class="control-group">
      <div class="control-label">
        <span class="name">基础频率</span>
        <span class="value" id="droneFreqVal">130 Hz</span>
      </div>
      <input type="range" id="droneFreq" min="60" max="440" value="130" step="5">
    </div>
  </div>

  <!-- Shared Controls -->
  <div class="controls">
    <div class="control-group">
      <div class="control-label">
        <span class="name">差频（双耳拍频率）</span>
        <span class="value" id="beatVal">10 Hz</span>
      </div>
      <input type="range" id="beat" min="1" max="50" value="10" step="0.5">
    </div>
    <div class="control-group">
      <div class="control-label">
        <span class="name">频率分配</span>
      </div>
      <select id="freqDist">
        <option value="symmetric">⚖️ 对称分配 — 双耳各移 ±½差频（推荐）</option>
        <option value="right">➡️ 仅右耳频移 — 左耳原始，右耳 +差频</option>
        <option value="left">⬅️ 仅左耳频移 — 左耳 -差频，右耳原始</option>
        <option value="alternating">↔️ 左右交替 — 对称分配，定时交换（推荐长听）</option>
      </select>
    </div>
    <div class="control-group">
      <div class="control-label">
        <span class="name">音量</span>
        <span class="value" id="volVal">25%</span>
      </div>
      <input type="range" id="volume" min="0" max="100" value="25" step="1">
    </div>
  </div>

  <div class="channel-info">
    <span class="ch-left" id="leftInfo">左耳: —</span>
    <span class="ch-right" id="rightInfo">右耳: —</span>
  </div>

  <canvas id="waveCanvas"></canvas>
  <div class="info-panel" id="infoPanel"></div>

  <!-- Beat frequency presets -->
  <div class="presets">
    <button class="preset-btn" data-beat="2"><div class="freq">2 Hz</div><div class="desc">Delta · 深沉起伏</div></button>
    <button class="preset-btn" data-beat="6"><div class="freq">6 Hz</div><div class="desc">Theta · 冥想</div></button>
    <button class="preset-btn" data-beat="10"><div class="freq">10 Hz</div><div class="desc">Alpha · 放松</div></button>
    <button class="preset-btn" data-beat="18"><div class="freq">18 Hz</div><div class="desc">Beta · 专注</div></button>
    <button class="preset-btn" data-beat="30"><div class="freq">30 Hz</div><div class="desc">极限 · 粗糙</div></button>
    <button class="preset-btn" data-beat="42"><div class="freq">42 Hz</div><div class="desc">瓦解 · 对比</div></button>
  </div>
</div>

<script type="module" src="js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>

</body>
</html>
