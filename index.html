<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>双耳拍体验器 Pro</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0a0a1a; color: #e0e0e0;
  min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  padding: 20px;
}
h1 { color: #7eb8ff; margin-bottom: 4px; font-size: 1.7em; }
.subtitle { color: #888; margin-bottom: 16px; font-size: 0.85em; }
.warning {
  background: #2a1a00; border: 1px solid #664400; border-radius: 8px;
  padding: 10px 14px; margin-bottom: 16px; max-width: 640px;
  font-size: 0.82em; color: #ffaa44; line-height: 1.5;
}
.container {
  background: #12122a; border-radius: 16px; padding: 24px;
  max-width: 640px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.4);
}

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 18px; }
.tab-btn {
  flex: 1; padding: 10px 6px; border: 1px solid #2a2a4a; border-radius: 8px;
  background: #1a1a32; color: #999; cursor: pointer; font-size: 0.9em;
  transition: all 0.15s; text-align: center;
}
.tab-btn.active { background: #252560; color: #7eb8ff; border-color: #7eb8ff; font-weight: 600; }
.tab-btn:hover { background: #252548; color: #ccc; }

/* Play button */
.play-btn {
  width: 100%; padding: 14px; font-size: 1.2em; border: none; border-radius: 10px;
  cursor: pointer; transition: all 0.2s; font-weight: 600; letter-spacing: 1px;
}
.play-btn.off { background: linear-gradient(135deg, #2a5298, #1e3c72); color: #fff; }
.play-btn.on { background: linear-gradient(135deg, #c0392b, #96281b); color: #fff; }
.play-btn:hover { transform: scale(1.01); filter: brightness(1.15); }

/* Panels */
.panel { display: none; margin: 16px 0; }
.panel.active { display: block; }

/* Controls */
.controls { margin-top: 12px; }
.control-group { margin-bottom: 14px; }
.control-label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
.control-label .name { font-size: 0.88em; color: #aaa; }
.control-label .value { font-size: 1em; color: #7eb8ff; font-weight: 600; font-variant-numeric: tabular-nums; }
input[type="range"] {
  -webkit-appearance: none; width: 100%; height: 5px; border-radius: 3px;
  background: #1e1e3a; outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
  background: #7eb8ff; cursor: pointer; box-shadow: 0 0 6px rgba(126,184,255,0.3);
}
select {
  width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #2a2a4a;
  background: #1a1a32; color: #ccc; font-size: 0.9em; cursor: pointer;
}

/* File upload */
.file-area {
  border: 2px dashed #2a2a5a; border-radius: 10px; padding: 20px; text-align: center;
  cursor: pointer; transition: all 0.2s; color: #666; font-size: 0.9em;
}
.file-area:hover { border-color: #7eb8ff; color: #aaa; }
.file-area.loaded { border-color: #4adf8a; border-style: solid; color: #4adf8a; }
.file-area input { display: none; }

/* Channel info */
.channel-info {
  display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.8em; color: #666;
}
.channel-info span { padding: 3px 8px; border-radius: 4px; }
.ch-left { background: #1a1a2e; color: #ff7eb3; }
.ch-right { background: #1a1a2e; color: #7effd1; }

canvas {
  width: 100%; height: 80px; margin-top: 12px; border-radius: 8px; background: #0a0a18;
}

.info-panel {
  margin-top: 14px; padding: 12px; background: #0e0e20; border-radius: 8px;
  font-size: 0.82em; line-height: 1.7;
}
.band-delta { color: #b07aff; font-weight: 700; }
.band-theta { color: #5aafff; font-weight: 700; }
.band-alpha { color: #4adf8a; font-weight: 700; }
.band-beta { color: #ffe44a; font-weight: 700; }
.band-collapse { color: #ff6a6a; font-weight: 700; }

.presets { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 14px; }
.preset-btn {
  padding: 8px 4px; border: 1px solid #2a2a4a; border-radius: 6px;
  background: #1a1a32; color: #ccc; cursor: pointer; font-size: 0.78em;
  transition: all 0.15s; text-align: center; line-height: 1.3;
}
.preset-btn:hover { background: #252548; border-color: #7eb8ff; color: #fff; }
.preset-btn .freq { font-weight: 700; color: #7eb8ff; font-size: 1.05em; }
.preset-btn .desc { color: #888; font-size: 0.82em; }
</style>
</head>
<body>

<h1>🎧 双耳拍体验器 Pro</h1>
<p class="subtitle">Binaural Beat Explorer — 纯音 · 音乐频移 · 持续音</p>

<div class="warning">
  ⚠️ <strong>必须佩戴耳机！</strong>左右耳需分别接收不同频率。用扬声器无效。建议低音量开始。
</div>

<div class="container">
  <!-- Mode tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-mode="pure" onclick="switchMode('pure')">🎵 纯音</button>
    <button class="tab-btn" data-mode="music" onclick="switchMode('music')">🎶 音乐频移</button>
    <button class="tab-btn" data-mode="drone" onclick="switchMode('drone')">🕉 持续音</button>
  </div>

  <button class="play-btn off" id="playBtn" onclick="togglePlay()">▶ 戴上耳机，点击开始</button>

  <!-- Pure Tone Panel -->
  <div class="panel active" id="panel-pure">
    <div class="control-group">
      <div class="control-label">
        <span class="name">载波频率</span>
        <span class="value" id="carrierVal">200 Hz</span>
      </div>
      <input type="range" id="carrier" min="80" max="1000" value="200" step="10" oninput="updateParams()">
    </div>
  </div>

  <!-- Music Panel -->
  <div class="panel" id="panel-music">
    <div class="file-area" id="fileArea" onclick="document.getElementById('fileInput').click()">
      📁 点击选择音频文件（MP3 / WAV / OGG / FLAC）
      <input type="file" id="fileInput" accept="audio/*" onchange="handleFileUpload(event)">
    </div>
    <div style="margin-top:8px; font-size:0.8em; color:#666;" id="fileInfo"></div>
    <label style="display:flex; align-items:center; gap:6px; margin-top:8px; font-size:0.82em; color:#aaa; cursor:pointer;">
      <input type="checkbox" id="loopToggle" checked> 循环播放
    </label>
  </div>

  <!-- Drone Panel -->
  <div class="panel" id="panel-drone">
    <div class="control-group">
      <div class="control-label">
        <span class="name">持续音类型</span>
      </div>
      <select id="droneType" onchange="onDroneTypeChange()">
        <option value="tambura">🪕 坦布拉 Tambura — 丰富泛音</option>
        <option value="bowl">🔔 颂钵 Singing Bowl — 非谐波泛音</option>
        <option value="organ">⛪ 管风琴 Organ — 庄严和声</option>
        <option value="pad">🎹 合成Pad — 温暖厚实</option>
      </select>
    </div>
    <div class="control-group">
      <div class="control-label">
        <span class="name">基础频率</span>
        <span class="value" id="droneFreqVal">130 Hz</span>
      </div>
      <input type="range" id="droneFreq" min="60" max="440" value="130" step="5" oninput="updateParams()">
    </div>
  </div>

  <!-- Shared Controls -->
  <div class="controls">
    <div class="control-group">
      <div class="control-label">
        <span class="name">差频（双耳拍频率）</span>
        <span class="value" id="beatVal">10 Hz</span>
      </div>
      <input type="range" id="beat" min="1" max="50" value="10" step="0.5" oninput="updateParams()">
    </div>
    <div class="control-group">
      <div class="control-label">
        <span class="name">频率分配</span>
      </div>
      <select id="freqDist" onchange="updateParams()">
        <option value="symmetric">⚖️ 对称分配 — 双耳各移 ±½差频（推荐）</option>
        <option value="right">➡️ 仅右耳频移 — 左耳原始，右耳 +差频</option>
        <option value="left">⬅️ 仅左耳频移 — 左耳 -差频，右耳原始</option>
      </select>
    </div>
    <div class="control-group">
      <div class="control-label">
        <span class="name">音量</span>
        <span class="value" id="volVal">25%</span>
      </div>
      <input type="range" id="volume" min="0" max="100" value="25" step="1" oninput="updateParams()">
    </div>
  </div>

  <div class="channel-info">
    <span class="ch-left" id="leftInfo">左耳: —</span>
    <span class="ch-right" id="rightInfo">右耳: —</span>
  </div>

  <canvas id="waveCanvas"></canvas>
  <div class="info-panel" id="infoPanel"></div>

  <!-- Beat frequency presets -->
  <div class="presets">
    <button class="preset-btn" onclick="setBeat(2)"><div class="freq">2 Hz</div><div class="desc">Delta · 深沉起伏</div></button>
    <button class="preset-btn" onclick="setBeat(6)"><div class="freq">6 Hz</div><div class="desc">Theta · 冥想</div></button>
    <button class="preset-btn" onclick="setBeat(10)"><div class="freq">10 Hz</div><div class="desc">Alpha · 放松</div></button>
    <button class="preset-btn" onclick="setBeat(18)"><div class="freq">18 Hz</div><div class="desc">Beta · 专注</div></button>
    <button class="preset-btn" onclick="setBeat(30)"><div class="freq">30 Hz</div><div class="desc">极限 · 粗糙</div></button>
    <button class="preset-btn" onclick="setBeat(42)"><div class="freq">42 Hz</div><div class="desc">瓦解 · 对比</div></button>
  </div>
</div>

<script>
// ============================================================
// GLOBALS
// ============================================================
let audioCtx = null;
let isPlaying = false;
let currentMode = 'pure';
let activeNodes = [];
let animId = null;

// Music mode — FFT-based analytic signal
let musicBuffer = null;     // decoded AudioBuffer
let analyticReal = null;    // Float32Array — original mono signal
let analyticImag = null;    // Float32Array — Hilbert transform of mono signal
let analyticReady = false;  // true when precomputation is done
let musicSource = null;
let ssbProcessor = null;

// Drone mode
let droneOscillators = [];

// ============================================================
// FFT (radix-2 Cooley-Tukey, in-place)
// ============================================================
function fft(re, im, N) {
  let j = 0;
  for (let i = 0; i < N - 1; i++) {
    if (i < j) {
      let t = re[i]; re[i] = re[j]; re[j] = t;
      t = im[i]; im[i] = im[j]; im[j] = t;
    }
    let k = N >> 1;
    while (k <= j) { j -= k; k >>= 1; }
    j += k;
  }
  for (let len = 2; len <= N; len *= 2) {
    const half = len >> 1;
    const angle = -2 * Math.PI / len;
    const wR = Math.cos(angle), wI = Math.sin(angle);
    for (let i = 0; i < N; i += len) {
      let tR = 1, tI = 0;
      for (let jj = 0; jj < half; jj++) {
        const idx = i + jj, idx2 = idx + half;
        const uR = re[idx], uI = im[idx];
        const vR = re[idx2] * tR - im[idx2] * tI;
        const vI = re[idx2] * tI + im[idx2] * tR;
        re[idx] = uR + vR; im[idx] = uI + vI;
        re[idx2] = uR - vR; im[idx2] = uI - vI;
        const nR = tR * wR - tI * wI;
        tI = tR * wI + tI * wR;
        tR = nR;
      }
    }
  }
}

function ifft(re, im, N) {
  for (let i = 0; i < N; i++) im[i] = -im[i];
  fft(re, im, N);
  for (let i = 0; i < N; i++) { re[i] /= N; im[i] = -im[i] / N; }
}

function nextPow2(n) { let p = 1; while (p < n) p <<= 1; return p; }

// ============================================================
// Precompute analytic signal via FFT (chunked overlap-save)
// ============================================================
async function precomputeAnalytic(mono, onProgress) {
  const origLen = mono.length;
  const CHUNK = 1 << 15;  // 32768
  const OVERLAP = 4096;   // discard this many at each edge
  const GOOD = CHUNK - 2 * OVERLAP;

  const realOut = new Float32Array(origLen);
  const imagOut = new Float32Array(origLen);
  const totalChunks = Math.ceil(origLen / GOOD);
  let chunkIdx = 0;

  for (let outStart = 0; outStart < origLen; outStart += GOOD) {
    const inStart = outStart - OVERLAP;
    const re = new Float32Array(CHUNK);
    const im = new Float32Array(CHUNK);

    // Fill chunk (zero-pad edges that fall outside signal)
    for (let i = 0; i < CHUNK; i++) {
      const srcIdx = inStart + i;
      re[i] = (srcIdx >= 0 && srcIdx < origLen) ? mono[srcIdx] : 0;
    }

    // FFT
    fft(re, im, CHUNK);

    // Analytic signal: zero negative freqs, double positive, keep DC & Nyquist
    for (let i = 1; i < CHUNK / 2; i++) { re[i] *= 2; im[i] *= 2; }
    for (let i = CHUNK / 2 + 1; i < CHUNK; i++) { re[i] = 0; im[i] = 0; }

    // IFFT
    ifft(re, im, CHUNK);

    // Copy only the "good" middle portion
    const copyStart = OVERLAP;
    const goodLen = Math.min(GOOD, origLen - outStart);
    for (let i = 0; i < goodLen; i++) {
      realOut[outStart + i] = re[copyStart + i];
      imagOut[outStart + i] = im[copyStart + i];
    }

    chunkIdx++;
    if (chunkIdx % 4 === 0 || chunkIdx === totalChunks) {
      if (onProgress) onProgress(chunkIdx / totalChunks);
      await new Promise(r => setTimeout(r, 0)); // yield to UI
    }
  }

  return { real: realOut, imag: imagOut };
}

// Drone type definitions
const DRONE_TYPES = {
  tambura: {
    baseFreq: 130,
    partials: [
      { ratio: 1, amp: 0.45 }, { ratio: 2, amp: 0.55 }, { ratio: 3, amp: 0.4 },
      { ratio: 4, amp: 0.3 }, { ratio: 5, amp: 0.18 }, { ratio: 6, amp: 0.12 },
      { ratio: 7, amp: 0.07 }, { ratio: 8, amp: 0.04 },
    ]
  },
  bowl: {
    baseFreq: 220,
    partials: [
      { ratio: 1, amp: 0.55 }, { ratio: 2.71, amp: 0.35 },
      { ratio: 4.8, amp: 0.2 }, { ratio: 7.2, amp: 0.12 },
    ]
  },
  organ: {
    baseFreq: 130,
    partials: [
      { ratio: 1, amp: 0.5 }, { ratio: 2, amp: 0.4 }, { ratio: 3, amp: 0.32 },
      { ratio: 4, amp: 0.22 }, { ratio: 5, amp: 0.12 }, { ratio: 6, amp: 0.08 },
      { ratio: 8, amp: 0.05 },
    ]
  },
  pad: {
    baseFreq: 180,
    partials: [
      { ratio: 1, amp: 0.5 }, { ratio: 1.002, amp: 0.45 }, { ratio: 0.998, amp: 0.45 },
      { ratio: 2, amp: 0.25 }, { ratio: 2.003, amp: 0.22 },
      { ratio: 3, amp: 0.12 },
    ]
  }
};

// ============================================================
// AUDIO CONTEXT
// ============================================================
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function getVal(id) { return parseFloat(document.getElementById(id).value); }

// ============================================================
// START / STOP
// ============================================================
async function togglePlay() {
  if (isPlaying) { stopAudio(); } else { await startAudio(); }
}

async function startAudio() {
  const ctx = getCtx();
  if (ctx.state === 'suspended') await ctx.resume();

  try {
    if (currentMode === 'pure') startPureTone(ctx);
    else if (currentMode === 'music') startMusic(ctx);
    else if (currentMode === 'drone') startDrone(ctx);
  } catch (e) {
    console.error('Start audio error:', e);
    alert('音频启动失败: ' + e.message);
    return;
  }

  isPlaying = true;
  const btn = document.getElementById('playBtn');
  btn.textContent = '■ 停止';
  btn.className = 'play-btn on';
  startVisualization();
  updateParams();
}

function stopAudio() {
  // Ramp down to avoid click
  const ctx = audioCtx;
  const now = ctx ? ctx.currentTime : 0;

  activeNodes.forEach(n => {
    try {
      if (n.stop) n.stop(now + 0.05);
      else if (n.disconnect) n.disconnect();
    } catch(e) {}
  });
  activeNodes = [];
  droneOscillators = [];
  musicSource = null;
  ssbProcessor = null;

  isPlaying = false;
  const btn = document.getElementById('playBtn');
  btn.textContent = '▶ 点击开始';
  btn.className = 'play-btn off';
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  clearCanvas();
}

// ============================================================
// PURE TONE MODE
// ============================================================
function getPureFreqs() {
  const carrier = getVal('carrier');
  const beat = getVal('beat');
  const dist = document.getElementById('freqDist').value;
  if (dist === 'symmetric') return { left: carrier - beat / 2, right: carrier + beat / 2 };
  if (dist === 'left') return { left: carrier - beat, right: carrier };
  return { left: carrier, right: carrier + beat }; // 'right'
}

function startPureTone(ctx) {
  const vol = getVal('volume') / 100;
  const freqs = getPureFreqs();

  const merger = ctx.createChannelMerger(2);
  const gainL = ctx.createGain();
  const gainR = ctx.createGain();
  gainL.gain.setValueAtTime(vol, ctx.currentTime);
  gainR.gain.setValueAtTime(vol, ctx.currentTime);

  const oscL = ctx.createOscillator();
  const oscR = ctx.createOscillator();
  oscL.type = 'sine';
  oscR.type = 'sine';
  oscL.frequency.setValueAtTime(freqs.left, ctx.currentTime);
  oscR.frequency.setValueAtTime(freqs.right, ctx.currentTime);

  oscL.connect(gainL); gainL.connect(merger, 0, 0);
  oscR.connect(gainR); gainR.connect(merger, 0, 1);
  merger.connect(ctx.destination);

  oscL.start(); oscR.start();

  activeNodes.push(oscL, oscR, gainL, gainR, merger);
  oscL._role = 'pureL'; oscR._role = 'pureR';
  gainL._role = 'pureGainL'; gainR._role = 'pureGainR';
}

function updatePureTone() {
  const vol = getVal('volume') / 100;
  const freqs = getPureFreqs();
  const ctx = audioCtx;
  const now = ctx.currentTime;

  activeNodes.forEach(n => {
    if (n._role === 'pureL') n.frequency.setValueAtTime(freqs.left, now);
    if (n._role === 'pureR') n.frequency.setValueAtTime(freqs.right, now);
    if (n._role === 'pureGainL' || n._role === 'pureGainR') n.gain.setValueAtTime(vol, now);
  });

  document.getElementById('leftInfo').textContent = '左耳: ' + freqs.left.toFixed(1) + ' Hz';
  document.getElementById('rightInfo').textContent = '右耳: ' + freqs.right.toFixed(1) + ' Hz';
}

// ============================================================
// MUSIC SSB MODE — FFT-based precomputation + real-time modulation
// ============================================================
function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const ctx = getCtx();

  analyticReady = false;
  analyticReal = null;
  analyticImag = null;
  document.getElementById('fileInfo').textContent = '解码中...';

  const reader = new FileReader();
  reader.onload = function(e) {
    ctx.decodeAudioData(e.target.result, async function(buffer) {
      musicBuffer = buffer;
      const dur = buffer.duration.toFixed(1);
      document.getElementById('fileInfo').textContent =
        '✅ ' + file.name + ' (' + dur + 's) — 正在预处理频移数据...';

      // Convert to mono
      const numCh = buffer.numberOfChannels;
      const len = buffer.length;
      const mono = new Float32Array(len);
      for (let ch = 0; ch < numCh; ch++) {
        const chData = buffer.getChannelData(ch);
        for (let i = 0; i < len; i++) mono[i] += chData[i];
      }
      if (numCh > 1) {
        const inv = 1 / numCh;
        for (let i = 0; i < len; i++) mono[i] *= inv;
      }

      // Precompute analytic signal
      try {
        const result = await precomputeAnalytic(mono, function(progress) {
          document.getElementById('fileInfo').textContent =
            '✅ ' + file.name + ' — 预处理: ' + Math.round(progress * 100) + '%';
        });
        analyticReal = result.real;
        analyticImag = result.imag;
        analyticReady = true;
        document.getElementById('fileInfo').textContent =
          '✅ ' + file.name + ' (' + dur + 's) — 已就绪，点击开始播放';
        document.getElementById('fileArea').className = 'file-area loaded';
      } catch (err) {
        document.getElementById('fileInfo').textContent = '❌ 预处理失败: ' + err;
      }
    }, function(err) {
      document.getElementById('fileInfo').textContent = '❌ 解码失败: ' + err;
    });
  };
  reader.readAsArrayBuffer(file);
}

function getMusicShifts() {
  const beat = getVal('beat');
  const dist = document.getElementById('freqDist').value;
  if (dist === 'symmetric') return { left: -beat / 2, right: beat / 2 };
  if (dist === 'left') return { left: -beat, right: 0 };
  return { left: 0, right: beat }; // 'right'
}

function startMusic(ctx) {
  if (!analyticReady) {
    alert('请先选择音频文件并等待预处理完成');
    throw new Error('Analytic signal not ready');
  }

  const beat = getVal('beat');
  const vol = getVal('volume') / 100;
  const sr = ctx.sampleRate;
  const dataLen = analyticReal.length;
  const loop = document.getElementById('loopToggle').checked;
  const shifts = getMusicShifts();

  // ScriptProcessorNode for real-time SSB modulation
  const bufSize = 4096;
  ssbProcessor = ctx.createScriptProcessor(bufSize, 0, 2);

  let pos = 0;
  let phaseL = 0, phaseR = 0;
  let currentShiftL = shifts.left, currentShiftR = shifts.right;

  ssbProcessor._setShifts = (sL, sR) => { currentShiftL = sL; currentShiftR = sR; };

  const aReal = analyticReal;
  const aImag = analyticImag;
  const TWO_PI = 2 * Math.PI;

  ssbProcessor.onaudioprocess = function(e) {
    const outL = e.outputBuffer.getChannelData(0);
    const outR = e.outputBuffer.getChannelData(1);
    const len = outL.length;
    const sL = currentShiftL, sR = currentShiftR;
    const phaseIncL = TWO_PI * sL / sr;
    const phaseIncR = TWO_PI * sR / sr;

    for (let i = 0; i < len; i++) {
      if (pos >= dataLen) {
        if (loop) { pos = 0; } else { outL[i] = 0; outR[i] = 0; continue; }
      }

      const r = aReal[pos];
      const h = aImag[pos];

      // SSB: Re((r + jh) * e^(j*phase)) = r*cos(phase) - h*sin(phase)
      // When shift=0, cos=1 sin=0, output = r (original)
      if (sL === 0) { outL[i] = r; }
      else { outL[i] = r * Math.cos(phaseL) - h * Math.sin(phaseL); }

      if (sR === 0) { outR[i] = r; }
      else { outR[i] = r * Math.cos(phaseR) - h * Math.sin(phaseR); }

      phaseL += phaseIncL;
      phaseR += phaseIncR;
      if (phaseL > TWO_PI) phaseL -= TWO_PI;
      else if (phaseL < -TWO_PI) phaseL += TWO_PI;
      if (phaseR > TWO_PI) phaseR -= TWO_PI;
      else if (phaseR < -TWO_PI) phaseR += TWO_PI;
      pos++;
    }
  };

  // Volume control
  const volNode = ctx.createGain();
  volNode.gain.setValueAtTime(vol, ctx.currentTime);
  volNode._role = 'musicVol';

  // Connect: processor → volume → destination
  ssbProcessor.connect(volNode);
  volNode.connect(ctx.destination);

  activeNodes.push(ssbProcessor, volNode);

  updateMusicInfo();
}

function updateMusicInfo() {
  const shifts = getMusicShifts();
  const dist = document.getElementById('freqDist').value;
  if (dist === 'symmetric') {
    document.getElementById('leftInfo').textContent = '左耳: 频移 ' + shifts.left.toFixed(1) + ' Hz';
    document.getElementById('rightInfo').textContent = '右耳: 频移 +' + shifts.right.toFixed(1) + ' Hz';
  } else if (dist === 'left') {
    document.getElementById('leftInfo').textContent = '左耳: 频移 ' + shifts.left.toFixed(1) + ' Hz';
    document.getElementById('rightInfo').textContent = '右耳: 原始音频';
  } else {
    document.getElementById('leftInfo').textContent = '左耳: 原始音频';
    document.getElementById('rightInfo').textContent = '右耳: 频移 +' + shifts.right.toFixed(1) + ' Hz';
  }
}

function updateMusic() {
  const vol = getVal('volume') / 100;
  const shifts = getMusicShifts();
  if (ssbProcessor && ssbProcessor._setShifts) ssbProcessor._setShifts(shifts.left, shifts.right);
  activeNodes.forEach(n => {
    if (n._role === 'musicVol') n.gain.setValueAtTime(vol, audioCtx.currentTime);
  });
  updateMusicInfo();
}

// ============================================================
// DRONE MODE
// ============================================================
function getDroneFreqs(baseFreq, ratio) {
  const beat = getVal('beat');
  const dist = document.getElementById('freqDist').value;
  const center = baseFreq * ratio;
  if (dist === 'symmetric') return { left: center - beat / 2, right: center + beat / 2 };
  if (dist === 'left') return { left: center - beat, right: center };
  return { left: center, right: center + beat }; // 'right'
}

function startDrone(ctx) {
  const type = document.getElementById('droneType').value;
  const def = DRONE_TYPES[type];
  const baseFreq = getVal('droneFreq');
  const vol = getVal('volume') / 100;

  const merger = ctx.createChannelMerger(2);
  const masterGain = ctx.createGain();
  masterGain.gain.setValueAtTime(vol, ctx.currentTime);
  masterGain._role = 'droneVol';

  // LFO for gentle breathing
  const lfo = ctx.createOscillator();
  lfo.type = 'sine';
  lfo.frequency.setValueAtTime(0.08, ctx.currentTime);
  const lfoGain = ctx.createGain();
  lfoGain.gain.setValueAtTime(0.12, ctx.currentTime);
  lfo.connect(lfoGain);
  lfoGain.connect(masterGain.gain);
  lfo.start();

  droneOscillators = [];

  def.partials.forEach(p => {
    const freqs = getDroneFreqs(baseFreq, p.ratio);

    const oscL = ctx.createOscillator();
    const oscR = ctx.createOscillator();
    oscL.type = 'sine';
    oscR.type = 'sine';
    oscL.frequency.setValueAtTime(freqs.left, ctx.currentTime);
    oscR.frequency.setValueAtTime(freqs.right, ctx.currentTime);

    const gL = ctx.createGain();
    const gR = ctx.createGain();
    gL.gain.setValueAtTime(p.amp, ctx.currentTime);
    gR.gain.setValueAtTime(p.amp, ctx.currentTime);

    oscL.connect(gL); gL.connect(merger, 0, 0);
    oscR.connect(gR); gR.connect(merger, 0, 1);

    oscL.start(); oscR.start();

    droneOscillators.push({ oscL, oscR, gL, gR, ratio: p.ratio });
    activeNodes.push(oscL, oscR, gL, gR);
  });

  merger.connect(masterGain);
  masterGain.connect(ctx.destination);

  activeNodes.push(merger, masterGain, lfo, lfoGain);
}

function updateDrone() {
  const baseFreq = getVal('droneFreq');
  const beat = getVal('beat');
  const vol = getVal('volume') / 100;
  const now = audioCtx.currentTime;
  const dist = document.getElementById('freqDist').value;

  droneOscillators.forEach(d => {
    const freqs = getDroneFreqs(baseFreq, d.ratio);
    d.oscL.frequency.setValueAtTime(freqs.left, now);
    d.oscR.frequency.setValueAtTime(freqs.right, now);
  });
  activeNodes.forEach(n => {
    if (n._role === 'droneVol') n.gain.setValueAtTime(vol, now);
  });

  const type = document.getElementById('droneType').value;
  const partials = DRONE_TYPES[type].partials;
  const lowest = baseFreq * Math.min(...partials.map(p => p.ratio));
  if (dist === 'symmetric') {
    document.getElementById('leftInfo').textContent = '左耳: 基频 ' + lowest.toFixed(0) + ' Hz -' + (beat/2) + ' Hz';
    document.getElementById('rightInfo').textContent = '右耳: 基频 ' + lowest.toFixed(0) + ' Hz +' + (beat/2) + ' Hz';
  } else if (dist === 'left') {
    document.getElementById('leftInfo').textContent = '左耳: 全部 -' + beat + ' Hz 线性频移';
    document.getElementById('rightInfo').textContent = '右耳: 基频 ' + lowest.toFixed(0) + ' Hz + 泛音';
  } else {
    document.getElementById('leftInfo').textContent = '左耳: 基频 ' + lowest.toFixed(0) + ' Hz + 泛音';
    document.getElementById('rightInfo').textContent = '右耳: 全部 +' + beat + ' Hz 线性频移';
  }
  document.getElementById('droneFreqVal').textContent = baseFreq + ' Hz';
}

function onDroneTypeChange() {
  const type = document.getElementById('droneType').value;
  document.getElementById('droneFreq').value = DRONE_TYPES[type].baseFreq;
  document.getElementById('droneFreqVal').textContent = DRONE_TYPES[type].baseFreq + ' Hz';
  if (isPlaying && currentMode === 'drone') {
    stopAudio();
    startAudio();
  }
}

// ============================================================
// MODE SWITCHING
// ============================================================
function switchMode(mode) {
  if (isPlaying) stopAudio();
  currentMode = mode;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  document.querySelectorAll('.panel').forEach(p => {
    p.classList.toggle('active', p.id === 'panel-' + mode);
  });
  updateParams();
}

// ============================================================
// UPDATE ALL PARAMS
// ============================================================
function updateParams() {
  const beat = getVal('beat');
  const vol = getVal('volume');
  document.getElementById('beatVal').textContent = beat + ' Hz';
  document.getElementById('volVal').textContent = Math.round(vol) + '%';

  if (currentMode === 'pure') {
    document.getElementById('carrierVal').textContent = getVal('carrier') + ' Hz';
    if (isPlaying) updatePureTone();
    else {
      const freqs = getPureFreqs();
      document.getElementById('leftInfo').textContent = '左耳: ' + freqs.left.toFixed(1) + ' Hz';
      document.getElementById('rightInfo').textContent = '右耳: ' + freqs.right.toFixed(1) + ' Hz';
    }
  } else if (currentMode === 'music') {
    if (isPlaying) updateMusic();
    else {
      updateMusicInfo();
    }
  } else if (currentMode === 'drone') {
    if (isPlaying) updateDrone();
    else {
      const bf = getVal('droneFreq');
      const dist = document.getElementById('freqDist').value;
      if (dist === 'symmetric') {
        document.getElementById('leftInfo').textContent = '左耳: 基频 ' + bf + ' Hz -' + (beat/2) + ' Hz';
        document.getElementById('rightInfo').textContent = '右耳: 基频 ' + bf + ' Hz +' + (beat/2) + ' Hz';
      } else if (dist === 'left') {
        document.getElementById('leftInfo').textContent = '左耳: 全部 -' + beat + ' Hz 线性频移';
        document.getElementById('rightInfo').textContent = '右耳: 基频 ' + bf + ' Hz + 泛音';
      } else {
        document.getElementById('leftInfo').textContent = '左耳: 基频 ' + bf + ' Hz + 泛音';
        document.getElementById('rightInfo').textContent = '右耳: 全部 +' + beat + ' Hz 线性频移';
      }
      document.getElementById('droneFreqVal').textContent = bf + ' Hz';
    }
  }

  updateInfoPanel(beat);
}

function setBeat(v) {
  document.getElementById('beat').value = v;
  updateParams();
}

// ============================================================
// INFO PANEL
// ============================================================
function updateInfoPanel(beat) {
  const panel = document.getElementById('infoPanel');
  let bandHtml, desc;
  if (beat <= 4) {
    bandHtml = '<span class="band-delta">Delta (δ) 1–4 Hz</span>';
    desc = '深沉起伏，搏动缓慢如呼吸。';
  } else if (beat <= 8) {
    bandHtml = '<span class="band-theta">Theta (θ) 4–8 Hz</span>';
    desc = '明显的节奏搏动，冥想频段。';
  } else if (beat <= 13) {
    bandHtml = '<span class="band-alpha">Alpha (α) 8–13 Hz</span>';
    desc = '搏动清晰稳定，放松频段。';
  } else if (beat <= 30) {
    bandHtml = '<span class="band-beta">Beta (β) 13–30 Hz</span>';
    desc = '快速搏动→颤动→粗糙感。';
  } else if (beat <= 40) {
    bandHtml = '<span class="band-collapse">瓦解区 30–40 Hz</span>';
    desc = '脑干锁相极限，搏动开始瓦解。';
  } else {
    bandHtml = '<span class="band-collapse">超出范围 >40 Hz</span>';
    desc = '双耳拍消失，听到两个独立的音。';
  }
  const distLabel = { symmetric: '对称分配', left: '仅左耳频移', right: '仅右耳频移' }[document.getElementById('freqDist').value];
  const modeNote = currentMode === 'music' ? '<br>📌 音乐模式: SSB线性频移 · ' + distLabel
    : currentMode === 'drone' ? '<br>📌 持续音模式: 全部泛音线性频移 · ' + distLabel
    : '<br>📌 纯音模式: 最经典的双耳拍体验 · ' + distLabel;
  panel.innerHTML = bandHtml + ' — ' + desc + '<br>当前差频 <strong>' + beat + ' Hz</strong>' + modeNote;
}

// ============================================================
// VISUALIZATION
// ============================================================
function startVisualization() {
  const canvas = document.getElementById('waveCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * 2;
  canvas.height = canvas.offsetHeight * 2;
  const startTime = performance.now();

  function draw() {
    const beat = getVal('beat');
    const t = (performance.now() - startTime) / 1000;
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    // Beat envelope
    const periods = 4 / Math.max(beat, 0.5);
    ctx.beginPath();
    ctx.strokeStyle = currentMode === 'music' ? 'rgba(78,223,138,0.6)'
      : currentMode === 'drone' ? 'rgba(176,122,255,0.6)' : 'rgba(126,184,255,0.6)';
    ctx.lineWidth = 3;
    for (let x = 0; x < w; x++) {
      const tx = t + (x / w) * periods;
      const env = Math.cos(2 * Math.PI * beat * tx);
      const y = h / 2 - env * h * 0.35;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Fill
    ctx.lineTo(w, h/2); ctx.lineTo(0, h/2); ctx.closePath();
    ctx.fillStyle = currentMode === 'music' ? 'rgba(78,223,138,0.06)'
      : currentMode === 'drone' ? 'rgba(176,122,255,0.06)' : 'rgba(126,184,255,0.06)';
    ctx.fill();

    // Negative
    ctx.beginPath();
    ctx.strokeStyle = ctx.strokeStyle.replace('0.6', '0.25');
    ctx.lineWidth = 2;
    for (let x = 0; x < w; x++) {
      const tx = t + (x / w) * periods;
      const env = -Math.cos(2 * Math.PI * beat * tx);
      const y = h / 2 - env * h * 0.35;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Center line
    ctx.beginPath(); ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
    ctx.moveTo(0, h/2); ctx.lineTo(w, h/2); ctx.stroke();

    // Label
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = '18px sans-serif';
    const modeLabel = currentMode === 'music' ? '音乐' : currentMode === 'drone' ? '持续音' : '纯音';
    ctx.fillText(modeLabel + ' · 差频包络 ' + beat + ' Hz', 10, 24);

    animId = requestAnimationFrame(draw);
  }
  draw();
}

function clearCanvas() {
  const canvas = document.getElementById('waveCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * 2;
  canvas.height = canvas.offsetHeight * 2;
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.font = '18px sans-serif';
  ctx.fillText('点击开始后显示波形', 10, canvas.height / 2 + 5);
}

// ============================================================
// INIT
// ============================================================
updateParams();
clearCanvas();
</script>
